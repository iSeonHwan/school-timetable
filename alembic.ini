# Alembic 설정 파일
#
# 이 파일은 alembic CLI(alembic upgrade head 등)가 읽는 설정입니다.
# sqlalchemy.url 은 migrations/env.py 에서 DB_URL 환경 변수(또는 config.get_db_url())
# 로 덮어쓰므로, 여기서는 자리표시자만 둡니다.
#
# 사용 예:
#   alembic upgrade head      # 최신 revision까지 마이그레이션 적용
#   alembic stamp head         # 기존 DB를 현재 스키마 상태로 마킹 (재적용 방지)
#   alembic revision --autogenerate -m "add X column"   # 새 마이그레이션 생성
#   alembic history            # revision 이력 확인

[alembic]
# 자리표시자 — env.py 가 DB_URL 환경변수로 교체합니다.
script_location = migrations
sqlalchemy.url = sqlite:///timetable.db

# timezone: 마이그레이션 파일 타임스탬프에 사용
# 한국 시간(KST)이 관리에 편리하므로 Asia/Seoul 지정.
# 시스템 TZ 와 무관하게 항상 KST 로 찍힘.
timezone = Asia/Seoul

# version_table: alembic 버전 추적 테이블명 (기본 alembic_version).
# 명시적으로 지정해 두어 다른 시스템과 충돌하지 않게 합니다.
version_table = alembic_version

# file_template: 새 revision 파일명 템플릿.
# 날짜 + slug 포함해 이력을 읽기 쉽게 합니다.
# 예) 2026_06_20_1230-add_x_column.py
file_template = %%(year)d_%%(month)d_%%(day)d_%%(hour)d%%(minute)d-%%(slug)s

[post_write_hooks]
# (사용 중이지 않음 — 향후 black/isort 자동 포맷팅 훅 추가 가능)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S